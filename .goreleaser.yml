---
version: 2

project_name: obsidian-crdt-sync

before:
  hooks:
    - bun install --frozen-lockfile
    - bun run build

builds:
  - id: plugin-assets
    builder: bun
    main: src/main.ts
    binary: ignored
    skip: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^Release:"
      - "^Merge "

release:
  github:
    owner: yegor-usoltsev
    name: obsidian-crdt-sync
  name_template: "{{ .Version }}"
  footer: |
    ## Installation
    The plugin is not yet listed in the Obsidian Community Plugins directory. Install manually:
    1. Download `main.js`, `manifest.json`, `styles.css`, and `versions.json` from this page.
    2. Copy them to your vault's config plugins folder (usually `<vault>/.obsidian/plugins/crdt-sync/`).
    3. Enable the plugin under **Settings → Community plugins**.
  extra_files:
    - glob: ./main.js
    - glob: ./manifest.json
    - glob: ./styles.css
    - glob: ./versions.json
