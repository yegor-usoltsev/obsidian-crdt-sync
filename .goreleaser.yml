---
version: 2

project_name: obsidian-crdt-sync

before:
  hooks:
    - bun install --frozen-lockfile
    - bun run build

builds:
  - id: plugin-assets
    builder: bun
    main: src/main.ts
    binary: ignored
    skip: true

changelog:
  sort: asc
  abbrev: -1
  filters:
    exclude:
      - "^Release:"
      - "^Merge "

release:
  github:
    owner: yegor-usoltsev
    name: obsidian-crdt-sync
  name_template: "{{ .Version }}"
  extra_files:
    - glob: ./main.js
    - glob: ./manifest.json
    - glob: ./styles.css
    - glob: ./versions.json
